<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Clube do Parque 🌳</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4f0; color: #1a2e1a; }
    .container { max-width: 500px; margin: 0 auto; padding: 20px; }
    input, button, select { padding: 12px; margin: 6px 0; width: 100%; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #2d5a27; color: white; border: none; font-weight: bold; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    .card { background: white; border-radius: 12px; padding: 16px; margin: 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .error { color: #c00; background: #ffe6e6; padding: 10px; border-radius: 8px; }
    .success { color: #2d5a27; background: #e6ffe6; padding: 10px; border-radius: 8px; }
    nav { background: #2d5a27; padding: 12px 20px; color: white; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    nav a, nav button { color: white; background: none; border: none; text-decoration: none; margin: 0 5px; font-size: 14px; }
    nav span { font-weight: bold; }
    .tabs { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
    .tabs button { width: auto; padding: 8px 16px; background: #ddd; color: #333; }
    .tabs button.active { background: #2d5a27; color: white; }
    h2, h3 { margin-bottom: 12px; }
    .qr-container { text-align: center; margin: 20px 0; }
    .preview-img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = "https://rcpygvkzptueboypudws.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjcHlndmt6cHR1ZWJveXB1ZHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTk1MDEsImV4cCI6MjA5MzczNTUwMX0.pKq1R71GDclJlySEkYyXCo6FJUK8EVOhWVpHFqj_YPU";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function App() {
      const [session, setSession] = useState(null);
      const [role, setRole] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session) fetchProfile(session.user.id);
          else setLoading(false);
        });

        const { data: authListener } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          if (session) fetchProfile(session.user.id);
          else setRole(null);
        });
        return () => authListener?.subscription?.unsubscribe();
      }, []);

      async function fetchProfile(userId) {
        const { data: cliente } = await supabase.from("Clientes").select("tipo").eq("user_id", userId).maybeSingle();
        if (cliente) setRole(cliente.tipo);
        else setRole("customer");
        setLoading(false);
      }

      function logout() {
        supabase.auth.signOut();
      }

      if (loading) return <div className="container"><h2>Carregando...</h2></div>;

      return (
        <div>
          {session ? (
            <AuthenticatedApp session={session} role={role} logout={logout} />
          ) : (
            <LoginPage />
          )}
        </div>
      );
    }

    function LoginPage() {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");

      async function handleLogin(e) {
        e.preventDefault();
        setError("");
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) setError(error.message);
      }

      return (
        <div className="container" style={{ marginTop: 40 }}>
          <h2>🌳 Clube do Parque</h2>
          <form onSubmit={handleLogin}>
            <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required />
            <input type="password" placeholder="Senha" value={password} onChange={e => setPassword(e.target.value)} required />
            <button type="submit">Entrar</button>
            {error && <div className="error">{error}</div>}
          </form>
          <p style={{ marginTop: 20, textAlign: "center", fontSize: 14 }}>Demo: use qualquer email/senha para testar</p>
        </div>
      );
    }

    function AuthenticatedApp({ session, role, logout }) {
      const [tab, setTab] = useState("home");

      return (
        <div>
          <nav>
            <span>🌳 Clube do Parque</span>
            <button onClick={logout} style={{ background: "#b33", padding: "6px 12px", width: "auto", marginTop: 0 }}>Sair</button>
          </nav>

          <div className="tabs container">
            <button onClick={() => setTab("home")} className={tab === "home" ? "active" : ""}>Início</button>
            <button onClick={() => setTab("info")} className={tab === "info" ? "active" : ""}>Informações</button>
          </div>

          <div className="container">
            {tab === "home" && (
              <div>
                <h2>Bem-vindo ao Clube do Parque! 🎉</h2>
                <div className="card">
                  <p>Você está logado como: <strong>{session.user.email}</strong></p>
                </div>
                <p>Este é um exemplo de aplicação com React, Supabase e Vercel.</p>
              </div>
            )}
            {tab === "info" && (
              <div>
                <h2>Sobre o Projeto</h2>
                <div className="card">
                  <p><strong>Tecnologias utilizadas:</strong></p>
                  <ul style={{ marginLeft: 20 }}>
                    <li>React - Interface</li>
                    <li>Supabase - Autenticação e Banco de Dados</li>
                    <li>Vercel - Deploy</li>
                    <li>GitHub - Versionamento</li>
                  </ul>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
